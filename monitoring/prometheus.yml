# One Prometheus for the whole benchmark. k6 pushes its metrics in via
# remote-write (the receiver is enabled in the compose command); cAdvisor and
# node_exporter are scraped. Targets come from file_sd so local and cloud
# differ only by the mounted targets directory (compose: PROM_TARGETS env).
global:
  scrape_interval: 5s
  scrape_timeout: 4s

scrape_configs:
  - job_name: cadvisor
    file_sd_configs:
      - files: ["/etc/prometheus/targets/cadvisor.yml"]

  - job_name: node
    file_sd_configs:
      - files: ["/etc/prometheus/targets/node.yml"]

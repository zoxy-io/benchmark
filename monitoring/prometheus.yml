# One Prometheus for the whole benchmark. cAdvisor, node_exporter, and the zrk
# load generator's live /metrics (bridged by loadgen/zrk/run.py) are all scraped.
# Targets come from file_sd so local and cloud differ only by the mounted targets
# directory (compose: PROM_TARGETS env).
global:
  scrape_interval: 5s
  scrape_timeout: 4s

scrape_configs:
  - job_name: cadvisor
    file_sd_configs:
      - files: ["/etc/prometheus/targets/cadvisor.yml"]

  - job_name: node
    file_sd_configs:
      - files: ["/etc/prometheus/targets/node.yml"]

  # zrk's live /metrics (up only while a ramp runs; "down" between proxies is
  # expected). file_sd tolerates the target file being absent.
  - job_name: zrk
    file_sd_configs:
      - files: ["/etc/prometheus/targets/zrk.yml"]

# One Prometheus for the whole benchmark. cAdvisor, node_exporter, and the zrk
# load generator's live /metrics (bridged by loadgen/zrk/run.py) are all scraped.
# Targets come from file_sd so local and cloud differ only by the mounted targets
# directory (compose: PROM_TARGETS env).
global:
  scrape_interval: 5s
  scrape_timeout: 4s

scrape_configs:
  # 1s: the report's CPU-vs-offered curve resolves one point per scrape, so 5s
  # gave ~60 coarse points across a 300s ramp (~1.1k rps of offered axis each).
  # cAdvisor is pinned to 1s housekeeping in compose to match.
  - job_name: cadvisor
    scrape_interval: 1s
    scrape_timeout: 900ms
    file_sd_configs:
      - files: ["/etc/prometheus/targets/cadvisor.yml"]

  - job_name: node
    file_sd_configs:
      - files: ["/etc/prometheus/targets/node.yml"]

  # zrk's live /metrics (up only while a ramp runs; "down" between proxies is
  # expected). file_sd tolerates the target file being absent. 1s: the gauges
  # update once per zrk interval — scraping slower blurs the live dashboard.
  - job_name: zrk
    scrape_interval: 1s
    scrape_timeout: 900ms
    file_sd_configs:
      - files: ["/etc/prometheus/targets/zrk.yml"]

  # zoxy's own admin/metrics listener (config `admin.bind`, Prometheus exposition
  # text — zoxy_accepted/completed/l7_responses and the zoxy_shed_* counters that
  # witness every admission shed). Up only while the zoxy proxy runs; file_sd
  # tolerates the target file being absent between proxies. 1s to match the ramp.
  - job_name: zoxy
    scrape_interval: 1s
    scrape_timeout: 900ms
    file_sd_configs:
      - files: ["/etc/prometheus/targets/zoxy.yml"]

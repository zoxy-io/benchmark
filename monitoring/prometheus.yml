# One Prometheus for the whole benchmark. cAdvisor, node_exporter, and
# vegeta-ramp's live /metrics are all scraped. Targets come from file_sd so
# local and cloud differ only by the mounted targets directory (compose:
# PROM_TARGETS env).
global:
  scrape_interval: 5s
  scrape_timeout: 4s

scrape_configs:
  - job_name: cadvisor
    file_sd_configs:
      - files: ["/etc/prometheus/targets/cadvisor.yml"]

  - job_name: node
    file_sd_configs:
      - files: ["/etc/prometheus/targets/node.yml"]

  # vegeta-ramp's live /metrics (up only while a ramp runs; "down" between
  # proxies is expected). file_sd tolerates the target file being absent.
  - job_name: vegeta
    file_sd_configs:
      - files: ["/etc/prometheus/targets/vegeta.yml"]

# The full sweep. Cells = proxies × protocols × bodies × backend-counts.
# For each cell the orchestrator (1) ramps the arrival rate to find PEAK req/s
# (the highest rate the proxy sustains while generators+backends still have
# headroom — the self-check gate), then (2) measures latency at fixed fractions
# of that peak, `repeats` times.
#
# COST/TIME WARNING: as written this is 5×3×4×2 = 120 cells. Each cell is a
# peak search (several short rate points) plus fractions×repeats latency runs.
# Expect a few hours on the default fleet. Trim `proxies`, `bodies`, or
# `backend_counts` for a faster pass; `make bench PROXIES="zoxy haproxy"` overrides.

proxies: [zoxy, haproxy, envoy, traefik, caddy]

# h1     = HTTP/1.1 plaintext  -> :8080 via k6
# h1-tls = HTTP/1.1 over TLS   -> :8443 via wrk2 (k6 would negotiate h2)
# h2     = HTTP/2 over TLS     -> :8443 via k6
protocols: [h1, h1-tls, h2]

bodies: [64, 1k, 10k, 100k]     # request paths /64 /1k /10k /100k on the origin

backend_counts: [1, 3]          # 1 = single origin; 3 = exercise the LB path

load:
  warmup: "10s"                 # discarded before every measured run
  peak_duration: "15s"          # each rate point during the peak search
  measure_duration: "30s"       # each measured latency run
  repeats: 3                    # per fraction; bump to >=5 for publishable numbers
  latency_fractions: [0.5, 0.8, 0.95]

  peak_search:
    start_rate: 5000            # aggregate req/s across ALL generators
    factor: 1.5                 # multiply the target until the proxy can't keep up
    max_rate: 3000000
    keepup_ratio: 0.97          # achieved < ratio*target => saturated, stop

# per-generator wrk2 shape for the h1-tls cells (k6 sizes its own VUs)
wrk2:
  threads_per_core: 1           # threads = vCPUs on the loadgen host
  connections: 512

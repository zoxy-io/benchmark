# zoxy-benchmark v2 — containers ARE the deploy spec.
#
# One file describes every role; compose profiles pick what runs where:
#   monitoring  prometheus + grafana            (local: always; cloud: loadgen VM)
#   backend     nginx origin                    (local: always; cloud: backend VM)
#   <proxy>     exactly one proxy-under-test    (zoxy|haproxy|envoy|traefik|nginx|pingora)
# The load generator is not a compose service: loadgen/vegeta-ramp runs on the
# loadgen host, driven by scripts/vegeta-bench.sh.
# cadvisor + node_exporter carry every profile so each docker host exports
# per-container CPU/mem and host metrics no matter which role it plays.
#
# Local:  docker compose --profile monitoring --profile backend --profile haproxy up -d
# Cloud:  the same file + compose.cloud.yaml (host networking, cpuset, peer IPs).
# Resource limits are ENFORCED here (service-level cpus/mem_limit — no swarm
# needed); they are the fairness mechanism that replaces v1's "identical VMs".

# Every proxy gets the same box. PROXY_CPUS must match the thread knobs below
# (nbthread / --concurrency / GOMAXPROCS / worker_processes / threads) — we do
# NOT trust cgroup autodetection. zoxy has no thread knob, so it runs PROXY_CPUS
# worker processes sharing :8080 via SO_REUSEPORT, each pinned to a core
# (ZOXY_WORKERS below) — thread parity with the rest.
x-proxy-common: &proxy-common
  cpus: ${PROXY_CPUS:-1}
  mem_limit: ${PROXY_MEM:-512m}
  ulimits:
    nofile:
      soft: 1048576
      hard: 1048576
  restart: "no"
  depends_on:
    backend:
      condition: service_healthy
      required: false # cloud: backend runs on another VM, service absent there

services:
  # ---------------------------------------------------------------- origin --
  backend:
    image: nginx:1.27-alpine
    container_name: backend
    profiles: [backend]
    cpus: ${BACKEND_CPUS:-4}
    mem_limit: ${BACKEND_MEM:-1g}
    environment:
      # the image's envsubst hook renders the template into /etc/nginx at
      # start; BACKEND_CPUS must be an integer (it becomes worker_processes)
      BACKEND_CPUS: ${BACKEND_CPUS:-4}
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx
    volumes:
      - ./backend/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./backend/10-gen-bodies.sh:/docker-entrypoint.d/10-gen-bodies.sh:ro
    tmpfs:
      - /srv/bodies # canned 64B/1k/10k/100k responses live in RAM
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:9000/64"]
      interval: 2s
      timeout: 2s
      retries: 15

  # ------------------------------------------------------- proxies under test --
  # All six: listen :8080, L4 TCP passthrough (zoxy's libxev build is
  # L4-only, so EVERY proxy relays bytes — nobody parses HTTP), upstream =
  # backend:9000, no access logs. the generator speaks h1 end-to-end; the backend
  # nginx is the HTTP endpoint (an nginx proxy relays it at L4, same as the
  # rest). container_name == service name == the `name` label cAdvisor
  # exports, which is how the report joins CPU/mem to a proxy.
  zoxy:
    <<: *proxy-common
    build:
      context: ./proxies/zoxy
      args:
        ZOXY_REF: ${ZOXY_REF:-main}
        ZOXY_OPTIMIZE: ${ZOXY_OPTIMIZE:-ReleaseFast}
        RELAY_BUFFERS_MAX: ${RELAY_BUFFERS_MAX:-}
    # tag carries the optimize mode + relay-buffer override so each variant is a
    # distinct image (forces rebuild; recorded in runs.json versions)
    image: zoxy-bench/zoxy:${ZOXY_REF:-main}-${ZOXY_OPTIMIZE:-ReleaseFast}${RELAY_BUFFERS_MAX:+-rb${RELAY_BUFFERS_MAX}}
    container_name: zoxy
    profiles: [zoxy]
    # Docker's default seccomp profile denies io_uring_* since engine 25.0.
    # This is the default profile PLUS the three io_uring syscalls — NOT
    # unconfined, so zoxy keeps the same syscall-filter overhead as the rest.
    # (libxev's Linux backend is io_uring; there is no epoll fallback.)
    security_opt:
      - seccomp=./proxies/zoxy/seccomp-iouring.json
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
      memlock: -1 # io_uring ring memory counts against memlock on kernels <5.12
    # zoxy (libxev) has NO thread knob: one event loop per PROCESS. To spend a
    # multi-core box it runs ZOXY_WORKERS processes that share :8080 via
    # SO_REUSEPORT (kernel spreads connections) — the entrypoint supervises them.
    # ZOXY_WORKERS = PROXY_CPUS keeps thread parity with the others (nbthread /
    # --concurrency / GOMAXPROCS); 1 core => 1 process, exactly as before.
    # Concurrency is hard-capped at relay_buffers_max PER PROCESS (constants.zig;
    # 1024 on current main), one held per open tunnel for its LIFETIME — past it
    # zoxy sheds tunnels with a client EOF. N workers => N x that cap total; the
    # ramp's MAX_WORKERS stays well under it. Every other proxy has no such cap.
    # It also does no DNS — endpoints must be IP literals, so the entrypoint
    # resolves `backend` (env below) once at start and renders the template.
    environment:
      BACKEND: backend:9000
      ZOXY_WORKERS: ${PROXY_CPUS:-1}
    volumes:
      - ./proxies/zoxy/config.template.json:/etc/zoxy/config.template.json:ro
    ports:
      - "8080:8080"

  haproxy:
    <<: *proxy-common
    image: haproxy:3.0-alpine
    container_name: haproxy
    profiles: [haproxy]
    environment:
      NBTHREAD: ${PROXY_CPUS:-1}
      # hostname locally (bridge DNS + runtime resolver); the cloud overlay
      # replaces it with an IP literal because 127.0.0.11 doesn't exist there
      BACKEND_ADDR: backend:9000
    volumes:
      - ./proxies/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "8080:8080"

  envoy:
    <<: *proxy-common
    image: envoyproxy/envoy:v1.33-latest
    container_name: envoy
    profiles: [envoy]
    command:
      ["-c", "/etc/envoy/envoy.yaml", "--concurrency", "${PROXY_CPUS:-1}"]
    volumes:
      - ./proxies/envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
    ports:
      - "8080:8080"

  traefik:
    <<: *proxy-common
    image: traefik:v3.3
    container_name: traefik
    profiles: [traefik]
    environment:
      GOMAXPROCS: ${PROXY_CPUS:-1}
    volumes:
      - ./proxies/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./proxies/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    ports:
      - "8080:8080"

  nginx:
    <<: *proxy-common
    # nginx does L4 natively via the stream module — the official image ships
    # it compiled in (--with-stream), so unlike Caddy no custom build is
    # needed. The image's envsubst hook renders the template into /etc/nginx
    # at start; PROXY_CPUS becomes worker_processes (explicit thread parity).
    image: nginx:1.27-alpine
    container_name: nginx
    profiles: [nginx]
    environment:
      PROXY_CPUS: ${PROXY_CPUS:-1}
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx
    volumes:
      - ./proxies/nginx/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
    ports:
      - "8080:8080"

  pingora:
    <<: *proxy-common
    # Cloudflare Pingora is a framework, not a proxy — proxies/pingora builds a
    # tiny L4 TCP-passthrough binary on it (src/main.rs). THREADS (= PROXY_CPUS)
    # is the thread-parity knob; UPSTREAM is resolved once at startup.
    build:
      context: ./proxies/pingora
    image: zoxy-bench/pingora-l4:0.5
    container_name: pingora
    profiles: [pingora]
    environment:
      THREADS: ${PROXY_CPUS:-1}
      LISTEN: 0.0.0.0:8080
      UPSTREAM: backend:9000
    ports:
      - "8080:8080"

  # ------------------------------------------------------------- monitoring --
  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: prometheus
    profiles: [monitoring]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # local/ ships in-repo; vegeta-bench.sh generates cloud/ from terraform IPs
      - ./monitoring/targets/${PROM_TARGETS:-local}:/etc/prometheus/targets:ro
      - prom-data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.6.0
    container_name: grafana
    profiles: [monitoring]
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      # datasource url (see provisioning/datasources/prometheus.yml); local
      # default here, vegeta-bench.sh overrides via .env with the loadgen address.
      PROM_URL: ${PROM_URL:-http://prometheus:9090}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"

  # ------------------------------------------- per-host exporters (all roles) --
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    container_name: cadvisor
    profiles: [monitoring, backend, zoxy, haproxy, envoy, traefik, nginx, pingora]
    # Disk metrics off — only cpu/memory/network matter here. NOTE: the
    # docker host must run the classic overlay2 graphdriver
    # ({"features":{"containerd-snapshotter":false}} in daemon.json — see
    # cloud/cloud-init.yaml.tftpl); under the containerd image store
    # cAdvisor's docker handler breaks and every container loses its name
    # label. Keep this list in sync with compose.cloud.yaml (the override
    # replaces command wholesale).
    command:
      - --disable_metrics=advtcp,cpu_topology,disk,diskIO,hugetlb,memory_numa,percpu,process,referenced_memory,resctrl,sched,tcp,udp
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8081:8080"

  node_exporter:
    image: quay.io/prometheus/node-exporter:v1.9.0
    container_name: node_exporter
    profiles: [monitoring, backend, zoxy, haproxy, envoy, traefik, nginx, pingora]
    command: ["--path.rootfs=/host"]
    pid: host
    volumes:
      - /:/host:ro,rslave
    ports:
      - "9100:9100"

  # The load generator is loadgen/vegeta-ramp (an open-loop linear-ramp built on
  # Vegeta), run on the loadgen host by scripts/vegeta-bench.sh — not a compose
  # service. It exports a live /metrics endpoint scraped by the `vegeta` job in
  # prometheus.yml; results land as per-proxy CSVs for report/report_vegeta.py.

volumes:
  prom-data:

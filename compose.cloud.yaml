# Cloud overlay: docker compose -f compose.yaml -f compose.cloud.yaml ...
#
# Same services, three changes for VM deployment:
#  1. network_mode: host — no bridge NAT/conntrack on the measured path
#     (ports/networks !reset because they conflict with host networking).
#  2. cpuset pinning — proxy gets dedicated cores; on a dedicated VM this also
#     makes thread autodetection agree with the cpu limit.
#  3. peer addressing via env: proxy configs always dial the hostname
#     `backend`; here extra_hosts maps it to the backend VM's private IP
#     (zrk-bench.sh writes BACKEND_IP/PROXY_IP into .env from terraform).
#     zoxy itself does no DNS — its entrypoint resolves `backend` (via this
#     same extra_hosts entry) and renders the IP literal into its config.

x-host-net: &host-net
  network_mode: host
  ports: !reset []

services:
  backend:
    <<: *host-net

  zoxy:
    <<: *host-net
    cpuset: ${PROXY_CPUSET:-}
    extra_hosts:
      - "backend:${BACKEND_IP}"

  haproxy:
    <<: *host-net
    cpuset: ${PROXY_CPUSET:-}
    extra_hosts:
      - "backend:${BACKEND_IP}"
    environment:
      # IP literal: haproxy skips runtime DNS for numeric addresses, keeping
      # the (bridge-only) 127.0.0.11 resolvers section inert under host net
      BACKEND_ADDR: ${BACKEND_IP}:9000

  envoy:
    <<: *host-net
    cpuset: ${PROXY_CPUSET:-}
    extra_hosts:
      - "backend:${BACKEND_IP}"

  traefik:
    <<: *host-net
    cpuset: ${PROXY_CPUSET:-}
    extra_hosts:
      - "backend:${BACKEND_IP}"

  nginx:
    <<: *host-net
    cpuset: ${PROXY_CPUSET:-}
    extra_hosts:
      # nginx stream resolves `backend` once at startup via getaddrinfo, which
      # reads this /etc/hosts entry — no runtime resolver needed (like pingora)
      - "backend:${BACKEND_IP}"

  pingora:
    <<: *host-net
    cpuset: ${PROXY_CPUSET:-}
    extra_hosts:
      - "backend:${BACKEND_IP}"
    # pingora resolves `backend` at startup via getaddrinfo, which reads this
    # extra_hosts /etc/hosts entry — no runtime resolver needed (unlike haproxy)

  prometheus:
    <<: *host-net

  grafana:
    <<: *host-net

  cadvisor:
    <<: *host-net
    # host networking would collide with the proxy on :8080 — move cadvisor
    # (zrk-bench.sh writes the prometheus targets with :8081 to match).
    # The override replaces the whole command: keep the disable_metrics list
    # identical to compose.yaml.
    command:
      - --port=8081
      - --disable_metrics=advtcp,cpu_topology,disk,diskIO,hugetlb,memory_numa,percpu,process,referenced_memory,resctrl,sched,tcp,udp
    environment:
      # the image's built-in HEALTHCHECK probes $CADVISOR_HEALTHCHECK_URL,
      # which defaults to :8080 — repoint it at the moved port or `up --wait`
      # marks cadvisor unhealthy forever and aborts the run.
      CADVISOR_HEALTHCHECK_URL: http://localhost:8081/healthz

  node_exporter:
    <<: *host-net

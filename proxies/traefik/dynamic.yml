# L7 HTTP reverse proxy :8080 -> backend:9000 (parity with zoxy's phase-1 L7
# build — every proxy now parses HTTP/1.1 and reverse-proxies requests).
# PathPrefix(`/`) is the catch-all HTTP rule; Traefik keeps client connections
# alive and pools upstream connections by default.
http:
  routers:
    r-plain:
      rule: "PathPrefix(`/`)"
      entryPoints: [plain]
      service: origin
  services:
    origin:
      loadBalancer:
        servers:
          - url: "http://backend:9000"

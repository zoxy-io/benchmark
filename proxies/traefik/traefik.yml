# Static config. GOMAXPROCS=1 comes from compose env (1 CPU, explicit — Go would
# otherwise count HOST cores). accessLog omitted => disabled. The router is an
# HTTP PathPrefix(`/`) catch-all — see dynamic.yml; the driver probes with a
# real GET, which the HTTP router serves.
entryPoints:
  plain:
    address: ":8080"

providers:
  file:
    filename: /etc/traefik/dynamic.yml
    watch: false

log:
  level: ERROR

api:
  dashboard: false

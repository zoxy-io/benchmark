# Static config. GOMAXPROCS (= PROXY_CPUS) comes from compose env — explicit
# thread parity. accessLog omitted => disabled.
entryPoints:
  plain:
    address: ":8080"

providers:
  file:
    filename: /etc/traefik/dynamic.yml
    watch: false

log:
  level: ERROR

api:
  dashboard: false

ping:
  entryPoint: plain

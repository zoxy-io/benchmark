# Static config. GOMAXPROCS (= PROXY_CPUS) comes from compose env — explicit
# thread parity. accessLog omitted => disabled. The router is a TCP (L4)
# catch-all — see dynamic.yml; no ping endpoint, the TCP router would shadow
# HTTP on the same entrypoint anyway (the driver probes through the tunnel).
entryPoints:
  plain:
    address: ":8080"

providers:
  file:
    filename: /etc/traefik/dynamic.yml
    watch: false

log:
  level: ERROR

api:
  dashboard: false

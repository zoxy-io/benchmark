# L7 HTTP reverse proxy :8080 -> backend:9000 (parity with zoxy's phase-1 L7
# build — every proxy now parses HTTP/1.1 and reverse-proxies requests). Worker
# count is hardcoded to 1 via --concurrency in the compose command (1 CPU).
# STRICT_DNS because the upstream is a hostname (compose service locally,
# extra_hosts entry in cloud). No access log. Envoy keeps both the downstream
# and the pooled upstream connections alive by default.
admin:
  address:
    socket_address: { address: 127.0.0.1, port_value: 9902 }

static_resources:
  listeners:
    - name: plain
      address:
        socket_address: { address: 0.0.0.0, port_value: 8080 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                common_http_protocol_options:
                  idle_timeout: 60s
                route_config:
                  name: local
                  virtual_hosts:
                    - name: origin
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route:
                            cluster: origin
                            # don't let Envoy time out the request itself; the
                            # loadgen owns the deadline (parity with the others).
                            timeout: 0s
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: origin
      connect_timeout: 5s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      # Envoy's DEFAULT circuit breaker caps a cluster at 1024 upstream
      # connections and requests; raise every threshold well above CONNECTIONS
      # so pooled HTTP requests are never queued/rejected (parity with haproxy
      # maxconn).
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 200000
            max_pending_requests: 200000
            max_requests: 200000
            max_retries: 200000
      load_assignment:
        cluster_name: origin
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: backend, port_value: 9000 }

# L4 TCP passthrough :8080 -> backend:9000 (parity with zoxy's L4-only libxev
# build — every proxy relays bytes, nobody parses HTTP). Worker count is
# hardcoded to 1 via --concurrency in the compose command (1 CPU). STRICT_DNS because
# the upstream is a hostname (compose service locally, extra_hosts entry in
# cloud). No access log. idle_timeout 60s matches haproxy/zoxy.
admin:
  address:
    socket_address: { address: 127.0.0.1, port_value: 9902 }

static_resources:
  listeners:
    - name: plain
      address:
        socket_address: { address: 0.0.0.0, port_value: 8080 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.tcp_proxy
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                stat_prefix: ingress_plain
                cluster: origin
                idle_timeout: 60s

  clusters:
    - name: origin
      connect_timeout: 5s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      # Envoy's DEFAULT circuit breaker caps a cluster at 1024 upstream
      # connections; tcp_proxy is 1:1 downstream:upstream, so past 1024 VUs the
      # excess connections get no upstream and fail (reset/EOF) while served
      # ones still return 200 — ~1 in 5 failing at the benchmark's VU pool.
      # Raise every threshold well above MAX_WORKERS (parity with haproxy maxconn).
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 200000
            max_pending_requests: 200000
            max_requests: 200000
            max_retries: 200000
      load_assignment:
        cluster_name: origin
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: backend, port_value: 9000 }

# L4 TCP passthrough :8080 -> backend:9000 (parity with zoxy's L4-only libxev
# build — every proxy relays bytes, nobody parses HTTP). Worker count comes
# from --concurrency in the compose command (= PROXY_CPUS). STRICT_DNS because
# the upstream is a hostname (compose service locally, extra_hosts entry in
# cloud). No access log. idle_timeout 60s matches haproxy/zoxy.
admin:
  address:
    socket_address: { address: 127.0.0.1, port_value: 9902 }

static_resources:
  listeners:
    - name: plain
      address:
        socket_address: { address: 0.0.0.0, port_value: 8080 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.tcp_proxy
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                stat_prefix: ingress_plain
                cluster: origin
                idle_timeout: 60s

  clusters:
    - name: origin
      connect_timeout: 5s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: origin
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: backend, port_value: 9000 }

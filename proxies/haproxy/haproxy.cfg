# h1 plaintext :8080 -> backend:9000. Thread count comes from the NBTHREAD env
# var set in compose (= PROXY_CPUS) — explicit thread parity, not autodetection.
# No log directives => nothing on the hot path.
global
    nbthread "${NBTHREAD}"
    maxconn 200000

defaults
    mode http
    option http-keep-alive
    timeout connect 5s
    timeout client 60s
    timeout server 60s

# Runtime DNS via Docker's embedded resolver. Without this, haproxy resolves
# `backend` once at config-parse time and *fatally exits* if the name isn't
# ready yet — a startup race that intermittently aborts the whole benchmark
# run. Control-plane only (periodic background lookups), never on the hot path.
resolvers docker
    nameserver dns 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry 1s
    hold valid 10s

frontend fe_plain
    bind 0.0.0.0:8080
    default_backend be_origin

backend be_origin
    balance roundrobin
    http-reuse always
    # init-addr libc,none: resolve immediately via libc when backend is already
    # up (fast path, parity with the other proxies); if it isn't, start anyway
    # and let `resolvers docker` resolve at runtime instead of aborting.
    server b0 backend:9000 resolvers docker init-addr libc,none

# L7 HTTP reverse proxy :8080 -> backend:9000 (parity with zoxy's phase-1 L7
# build — every proxy now parses HTTP/1.1 and reverse-proxies requests). Thread
# count is hardcoded to 1 (1 CPU) — explicit, not autodetection. No log
# directives => nothing on the hot path.
global
    nbthread 1
    maxconn 200000

defaults
    mode http
    # keep-alive both legs (haproxy's default in http mode); http-reuse safe
    # pools idle server connections across clients for parity with the other
    # L7 proxies (nginx keepalive, envoy/traefik/pingora pools, zoxy idle lists).
    option http-keep-alive
    http-reuse safe
    timeout connect 5s
    timeout client 60s
    timeout server 60s
    timeout http-request 60s
    timeout http-keep-alive 60s

# Runtime DNS via Docker's embedded resolver. Without this, haproxy resolves
# a hostname once at config-parse time and *fatally exits* if the name isn't
# ready yet — a startup race that intermittently aborts the whole benchmark
# run. Control-plane only (periodic background lookups), never on the hot path.
#
# 127.0.0.11 only exists on Docker BRIDGE networks. The cloud overlay runs
# host networking, where an unreachable resolver eventually invalidates the
# libc-resolved address and haproxy marks the server DOWN (~99% failures a
# minute into the ramp). Hence BACKEND_ADDR below: local = `backend:9000`
# (hostname -> this resolver is live and used), cloud = `<ip>:9000` (IP
# literal -> haproxy does no runtime DNS at all and this section is inert).
resolvers docker
    nameserver dns 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry 1s
    hold valid 10s

frontend fe_plain
    bind 0.0.0.0:8080
    default_backend be_origin

backend be_origin
    balance roundrobin
    # init-addr libc,none: resolve immediately via libc when backend is already
    # up (fast path, parity with the other proxies); if it isn't, start anyway
    # and let `resolvers docker` resolve at runtime instead of aborting.
    server b0 "${BACKEND_ADDR}" resolvers docker init-addr libc,none

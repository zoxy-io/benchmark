# h1 plaintext :8080 -> backend:9000. Thread count comes from the NBTHREAD env
# var set in compose (= PROXY_CPUS) — explicit thread parity, not autodetection.
# No log directives => nothing on the hot path.
global
    nbthread "${NBTHREAD}"
    maxconn 200000

defaults
    mode http
    option http-keep-alive
    timeout connect 5s
    timeout client 60s
    timeout server 60s

frontend fe_plain
    bind 0.0.0.0:8080
    default_backend be_origin

backend be_origin
    balance roundrobin
    http-reuse always
    server b0 backend:9000
